apiVersion: apps/v1
kind: Deployment
metadata:
  name: secure-rag-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: secure-rag-frontend
  template:
    metadata:
      labels:
        app: secure-rag-frontend
    spec:
      containers:
        - name: frontend
          image: secure-rag-frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_BASE_URL
              value: "https://api.example.com"
---
apiVersion: v1
kind: Service
metadata:
  name: secure-rag-frontend
spec:
  selector:
    app: secure-rag-frontend
  ports:
    - port: 3000
      targetPort: 3000

